# Watches nimble-giant/ailloy for new releases. When a new ailloy
# release tag is detected that's newer than ailloy-docs-version.txt,
# opens a PR that:
#   - bumps ailloy-docs-version.txt to the new tag
#   - syncs docs/ from that ailloy tag (mirrors top-level *.md and
#     topics/**)
#   - regenerates internal/embedded/ pre-renders
#
# release-please picks up the conventional commit and cuts the next
# extension release (minor bump for new docs content).

name: Poll Ailloy Releases

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          check-latest: true
          cache: true

      - name: Read currently mirrored ailloy version
        id: current
        run: |
          CUR="$(tr -d '\n[:space:]' < ailloy-docs-version.txt)"
          echo "value=$CUR" >> "$GITHUB_OUTPUT"

      - name: Look up latest ailloy release
        id: latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="$(gh release view --repo nimble-giant/ailloy --json tagName --jq '.tagName')"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Decide whether to sync
        id: decide
        env:
          CURRENT: ${{ steps.current.outputs.value }}
          LATEST: ${{ steps.latest.outputs.tag }}
        run: |
          if [ "$CURRENT" = "$LATEST" ]; then
            echo "needs_sync=false" >> "$GITHUB_OUTPUT"
          else
            echo "needs_sync=true" >> "$GITHUB_OUTPUT"
            echo "Sync needed: $CURRENT -> $LATEST"
          fi

      - name: Clone ailloy at target tag
        if: ${{ steps.decide.outputs.needs_sync == 'true' }}
        env:
          LATEST: ${{ steps.latest.outputs.tag }}
        run: |
          git clone --depth 1 --branch "${LATEST}" \
            https://github.com/nimble-giant/ailloy.git /tmp/ailloy

      - name: Mirror docs/ tree
        if: ${{ steps.decide.outputs.needs_sync == 'true' }}
        run: |
          rm -rf docs/topics docs/*.md
          cp /tmp/ailloy/docs/*.md docs/ 2>/dev/null || true
          cp -R /tmp/ailloy/docs/topics docs/topics 2>/dev/null || true
          # Preserve our own clidocs.go that lives next to the markdown.
          if [ -f /tmp/ailloy/docs/clidocs.go ]; then
            cp /tmp/ailloy/docs/clidocs.go docs/clidocs.go
          fi

      - name: Bump ailloy-docs-version.txt
        if: ${{ steps.decide.outputs.needs_sync == 'true' }}
        env:
          LATEST: ${{ steps.latest.outputs.tag }}
        run: |
          printf '%s\n' "${LATEST}" > ailloy-docs-version.txt

      - name: Regenerate pre-renders
        if: ${{ steps.decide.outputs.needs_sync == 'true' }}
        run: go run ./cmd/prerender -out internal/embedded -v

      - name: Open sync PR
        if: ${{ steps.decide.outputs.needs_sync == 'true' }}
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: poller/sync-ailloy
          delete-branch: true
          title: 'feat(docs): sync to ailloy ${{ steps.latest.outputs.tag }}'
          commit-message: 'feat(docs): sync to ailloy ${{ steps.latest.outputs.tag }}'
          body: |
            Automated sync from upstream ailloy release `${{ steps.latest.outputs.tag }}`.

            - Mirrors `docs/` from `nimble-giant/ailloy@${{ steps.latest.outputs.tag }}`
            - Updates `ailloy-docs-version.txt`
            - Regenerates `internal/embedded/` pre-renders

            Once merged, release-please will cut the next extension release.

            _Generated by `.github/workflows/poll-ailloy.yml`._
          labels: |
            automation
            poller
